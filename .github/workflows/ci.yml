name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore repo-local AssetsTools.NET
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\setup_assetstools.ps1

      - name: Restore repo-local Python
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\setup_local_python.ps1

      - name: Run automated tests
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\run_tests.ps1

      - name: Verify GUI build
        shell: pwsh
        run: dotnet build .\tools\HS2VoiceReplaceGui\HS2VoiceReplaceGui.csproj -c Release --nologo

      - name: Verify patcher build
        shell: pwsh
        run: dotnet build .\tools\UabAudioClipPatcher\UabAudioClipPatcher.csproj -c Release --nologo
