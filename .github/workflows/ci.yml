name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore repo-local AssetsTools.NET
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\setup_assetstools.ps1

      - name: Restore repo-local Python
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\setup_local_python.ps1

      - name: Run automated tests
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tools\run_tests.ps1

      - name: Verify GUI build
        shell: pwsh
        run: dotnet build .\tools\HS2VoiceReplaceGui\HS2VoiceReplaceGui.csproj -c Release --nologo

      - name: Verify patcher build
        shell: pwsh
        run: dotnet build .\tools\UabAudioClipPatcher\UabAudioClipPatcher.csproj -c Release --nologo

      - name: Publish GUI artifact
        shell: pwsh
        run: dotnet publish .\tools\HS2VoiceReplaceGui\HS2VoiceReplaceGui.csproj -c Release -r win-x64 --self-contained false -o .\artifacts\HS2VoiceReplaceGui --nologo

      - name: Publish patcher artifact
        shell: pwsh
        run: dotnet publish .\tools\UabAudioClipPatcher\UabAudioClipPatcher.csproj -c Release -r win-x64 --self-contained false -o .\artifacts\UabAudioClipPatcher --nologo

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v7
        with:
          name: HS2VoiceReplaceGui-win-x64
          path: .\artifacts\HS2VoiceReplaceGui
          if-no-files-found: error

      - name: Upload patcher artifact
        uses: actions/upload-artifact@v7
        with:
          name: UabAudioClipPatcher-win-x64
          path: .\artifacts\UabAudioClipPatcher
          if-no-files-found: error
